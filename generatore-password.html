<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Password - ED Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-83K00PC6ZZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-83K00PC6ZZ');
    </script>
</head>

<body>

    <nav class="navbar">
        <div class="nav-left">
            <span class="logo">E</span>
            <span class="brand">ED Tools</span>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="tools.html" class="active">Tool</a>
            <a href="novita.html">Novità</a>
            <a href="faq.html">FAQ</a>
            <a href="chi-sono.html">Chi sono</a>
            <a href="contatti.html">Contatti</a>
        </div>

        <button id="darkToggle" class="dark-btn">🌙</button>
    </nav>

    <header class="hero">
        <h1>Generatore di password</h1>
        <p>Crea password sicure e casuali in un clic.</p>
    </header>

    <section class="tool-container">
        <div class="tool-card">

            <label for="lunghezza">Lunghezza password</label>
            <input type="number" id="lunghezza" placeholder="Es. 12" min="4" max="50">

            <label>Caratteri da includere</label>
            <div class="checkbox-group">
                <label><input type="checkbox" id="maiuscole" checked> Lettere maiuscole</label>
                <label><input type="checkbox" id="minuscole" checked> Lettere minuscole</label>
                <label><input type="checkbox" id="numeri" checked> Numeri</label>
                <label><input type="checkbox" id="simboli"> Simboli</label>
            </div>

            <button id="generaPassword" class="btn">Genera password</button>

            <div class="result-box">
                <label>Password generata</label>
                <input type="text" id="risultatoPassword" readonly>
            </div>

        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
