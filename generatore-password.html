<header>
    <h1>Generatore di Password Sicure</h1>
    <p>Crea password casuali, robuste e difficili da indovinare.</p>
</header>

<main class="tool-container">

    <div class="input-group">
        <label for="lunghezza">Lunghezza password</label>
        <input type="number" id="lunghezza" min="4" max="64" value="12">
    </div>

    <div class="input-group checkbox-group">
        <label><input type="checkbox" id="maiuscole" checked> Lettere maiuscole (A‑Z)</label>
        <label><input type="checkbox" id="minuscole" checked> Lettere minuscole (a‑z)</label>
        <label><input type="checkbox" id="numeri" checked> Numeri (0‑9)</label>
        <label><input type="checkbox" id="simboli"> Simboli (!@#$...)</label>
    </div>

    <button onclick="generaPassword()" class="btn">Genera Password</button>

    <div id="risultato" class="result-box" style="display:none;">
        <h2>Password generata</h2>
        <p id="passwordGenerata" class="password-output"></p>
        <button onclick="copiaPassword()" class="btn small">Copia</button>
    </div>

</main>

<footer>
    <a href="index.html">← Torna alla Home</a>
</footer>

<script>
function generaPassword() {
    const lunghezza = parseInt(document.getElementById("lunghezza").value);
    const maiuscole = document.getElementById("maiuscole").checked;
    const minuscole = document.getElementById("minuscole").checked;
    const numeri = document.getElementById("numeri").checked;
    const simboli = document.getElementById("simboli").checked;

    let caratteri = "";
    if (maiuscole) caratteri += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if (minuscole) caratteri += "abcdefghijklmnopqrstuvwxyz";
    if (numeri) caratteri += "0123456789";
    if (simboli) caratteri += "!@#$%^&*()_-+=<>?/{}[]";

    if (caratteri === "") {
        alert("Seleziona almeno un tipo di carattere.");
        return;
    }

    let password = "";
    for (let i = 0; i < lunghezza; i++) {
        password += caratteri.charAt(Math.floor(Math.random() * caratteri.length));
    }

    document.getElementById("passwordGenerata").textContent = password;
    document.getElementById("risultato").style.display = "block";
}

function copiaPassword() {
    const testo = document.getElementById("passwordGenerata").textContent;
    navigator.clipboard.writeText(testo);
    alert("Password copiata!");
}
</script>
