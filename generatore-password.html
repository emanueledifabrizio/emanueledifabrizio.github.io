<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Password - ED Tools</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="logo">E</span>
        <span class="brand">ED Tools</span>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="tools.html">Tool</a>
        <a href="novita.html">Novità</a>
        <a href="chi-sono.html">Chi sono</a>
        <a href="contatti.html">Contatti</a>
    </div>

    <button id="darkToggle" class="dark-btn">🌙</button>
</nav>

<header class="hero">
    <h1>Generatore di Password Sicure</h1>
    <p>Crea password casuali, robuste e difficili da indovinare.</p>
</header>

<section class="tool-container">
    <div class="tool-box">

        <label>Lunghezza password:</label>
        <input type="number" id="lunghezza" value="12" min="4" max="50">

        <label>Opzioni:</label>
        <div>
            <input type="checkbox" id="maiuscole" checked> Lettere maiuscole<br>
            <input type="checkbox" id="minuscole" checked> Lettere minuscole<br>
            <input type="checkbox" id="numeri" checked> Numeri<br>
            <input type="checkbox" id="simboli"> Simboli (!@#$%)
        </div>

        <button onclick="genera()">Genera Password</button>

        <div id="risultato" class="result-box"></div>
    </div>
</section>

<footer>
    <p>© 2025 ED Tools — Creato da Emanuele</p>
</footer>

<script>
function genera() {
    const lunghezza = document.getElementById("lunghezza").value;
    let caratteri = "";

    if (document.getElementById("maiuscole").checked) caratteri += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if (document.getElementById("minuscole").checked) caratteri += "abcdefghijklmnopqrstuvwxyz";
    if (document.getElementById("numeri").checked) caratteri += "0123456789";
    if (document.getElementById("simboli").checked) caratteri += "!@#$%&*?";

    if (caratteri === "") {
        document.getElementById("risultato").innerHTML = "<p>Seleziona almeno un tipo di carattere.</p>";
        return;
    }

    let password = "";
    for (let i = 0; i < lunghezza; i++) {
        password += caratteri.charAt(Math.floor(Math.random() * caratteri.length));
    }

    document.getElementById("risultato").innerHTML = `
        <p><strong>Password generata:</strong></p>
        <p style="font-size:20px; word-break:break-all;">${password}</p>
    `;
}

document.getElementById("darkToggle").onclick = function() {
    document.body.classList.toggle("dark-mode");
    this.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
};
</script>

</body>
</html>
