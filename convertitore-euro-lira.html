        <h1>Convertitore Euro - Lira</h1>
        <p>Converti rapidamente tra Euro e Lire italiane.</p>
    </header>

    <section class="tool-container">
        <div class="tool-card">

            <label for="valore">Valore</label>
            <input type="number" id="valore" placeholder="Es. 100">

            <label for="direzione">Conversione</label>
            <select id="direzione">
                <option value="euro-lira">Da Euro a Lire</option>
                <option value="lira-euro">Da Lire a Euro</option>
            </select>

            <button id="convertiEuroLira" class="btn">Converti</button>

            <div class="result-box">
                <label>Risultato</label>
                <input type="text" id="risultatoEuroLira" readonly>
            </div>

        </div>
