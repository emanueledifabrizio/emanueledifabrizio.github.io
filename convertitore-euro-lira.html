<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertitore Euro ↔ Lira - ED Tools</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Stile globale -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="logo">E</span>
        <span class="brand">ED Tools</span>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="tools.html">Tool</a>
        <a href="chi-sono.html">Chi sono</a>
        <a href="contatti.html">Contatti</a>
    </div>

    <button id="darkToggle" class="dark-btn">🌙</button>
</nav>

<header class="hero">
    <h1>Convertitore Euro ↔ Lira</h1>
    <p>Converti rapidamente tra Euro e Lire italiane.</p>
</header>

<section class="tool-container">

    <div class="tool-box">
        <label>Importo:</label>
        <input type="number" id="valore" placeholder="Inserisci importo">

        <label>Conversione:</label>
        <select id="tipo">
            <option value="euro-lira">Da Euro a Lire</option>
            <option value="lira-euro">Da Lire a Euro</option>
        </select>

        <button onclick="converti()">Converti</button>

        <div id="risultato" class="result-box"></div>
    </div>

</section>

<footer>
    <p>© 2025 ED Tools — Creato da Emanuele</p>
</footer>

<script>
function converti() {
    const valore = parseFloat(document.getElementById("valore").value);
    const tipo = document.getElementById("tipo").value;

    if (isNaN(valore)) {
        document.getElementById("risultato").innerHTML = "<p>Inserisci un valore valido.</p>";
        return;
    }

    const tasso = 1936.27;
    let risultato;

    if (tipo === "euro-lira") {
        risultato = valore * tasso;
        document.getElementById("risultato").innerHTML = `
            <p><strong>${valore} €</strong> corrispondono a <strong>${risultato.toFixed(2)} Lire</strong></p>
        `;
    } else {
        risultato = valore / tasso;
        document.getElementById("risultato").innerHTML = `
            <p><strong>${valore} Lire</strong> corrispondono a <strong>${risultato.toFixed(2)} €</strong></p>
        `;
    }
}

document.getElementById("darkToggle").onclick = function() {
    document.body.classList.toggle("dark-mode");
    this.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
};
</script>

</body>
</html>
