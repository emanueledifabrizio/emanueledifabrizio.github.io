<header>
    <h1>Convertitore Euro ⇄ Lira</h1>
    <p>Converti rapidamente Euro in Lire e Lire in Euro.</p>
</header>

<main class="tool-container">

    <div class="input-group">
        <label for="importo">Importo</label>
        <input type="number" id="importo" placeholder="Inserisci un importo">
    </div>

    <div class="input-group">
        <label for="tipo">Conversione</label>
        <select id="tipo">
            <option value="euro-lira">Euro → Lire</option>
            <option value="lira-euro">Lire → Euro</option>
        </select>
    </div>

    <button onclick="converti()" class="btn">Converti</button>

    <div id="risultato" class="result-box" style="display:none;">
        <h2>Risultato</h2>
        <p><strong>Valore convertito:</strong> <span id="valoreConvertito"></span></p>
    </div>

</main>

<footer>
    <a href="index.html">← Torna alla Home</a>
</footer>

<script>
function converti() {
    const importo = parseFloat(document.getElementById("importo").value);
    const tipo = document.getElementById("tipo").value;

    if (isNaN(importo)) {
        alert("Inserisci un importo valido.");
        return;
    }

    const tasso = 1936.27; // Tasso fisso Euro-Lira

    let risultato;

    if (tipo === "euro-lira") {
        risultato = importo * tasso;
    } else {
        risultato = importo / tasso;
    }

    document.getElementById("valoreConvertito").textContent = risultato.toFixed(2);
    document.getElementById("risultato").style.display = "block";
}
</script>
