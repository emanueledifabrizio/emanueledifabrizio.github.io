    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

<body>

    <nav class="navbar">
        <div class="nav-left">
            <span class="logo">E</span>
            <span class="brand">ED Tools</span>

        <div class="nav-links">

    <header class="hero">
        <h1>Convertitore Euro ↔ Lira</h1>
        <p>Converti rapidamente tra euro e lire italiane.</p>
    </header>

    <section class="tool-container">
        <div class="tool-card">

            <label for="euroInput">Euro (€)</label>
            <input type="number" id="euroInput" placeholder="Es. 10">

            <button id="convertToLira" class="btn">Converti in Lire</button>

            <label for="liraInput">Lire (₤)</label>
            <input type="number" id="liraInput" placeholder="Es. 19360">

            <button id="convertToEuro" class="btn">Converti in Euro</button>

            <div class="result-box">
                <label>Risultato</label>
                <input type="text" id="euroLiraResult" readonly>
            </div>

        </div>
    </section>

    <script src="script.js"></script>
