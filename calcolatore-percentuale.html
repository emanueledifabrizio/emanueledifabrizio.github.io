<header>
    <h1>Calcolatore Percentuale</h1>
    <p>Calcola rapidamente percentuali e risultati matematici.</p>
</header>

<main class="tool-container">

    <div class="input-group">
        <label for="numero">Numero</label>
        <input type="number" id="numero" placeholder="Inserisci un numero">
    </div>

    <div class="input-group">
        <label for="percentuale">Percentuale (%)</label>
        <input type="number" id="percentuale" placeholder="Inserisci la percentuale">
    </div>

    <button onclick="calcolaPercentuale()" class="btn">Calcola</button>

    <div id="risultato" class="result-box" style="display:none;">
        <h2>Risultato</h2>
        <p><strong>Percentuale:</strong> <span id="risultatoPercentuale"></span></p>
    </div>

</main>

<footer>
    <a href="index.html">← Torna alla Home</a>
</footer>

<script>
function calcolaPercentuale() {
    const numero = parseFloat(document.getElementById("numero").value);
    const percentuale = parseFloat(document.getElementById("percentuale").value);

    if (isNaN(numero) || isNaN(percentuale)) {
        alert("Inserisci valori validi.");
        return;
    }

    const risultato = (numero * percentuale) / 100;

    document.getElementById("risultatoPercentuale").textContent = risultato.toFixed(2) + " €";
    document.getElementById("risultato").style.display = "block";
}
</script>
