<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore Percentuale - ED Tools</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="logo">E</span>
        <span class="brand">ED Tools</span>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="tools.html">Tool</a>
        <a href="novita.html">Novità</a>
        <a href="faq.html">FAQ</a>
        <a href="chi-sono.html">Chi sono</a>
        <a href="contatti.html">Contatti</a>
    </div>

    <button id="darkToggle" class="dark-btn">🌙</button>
</nav>

<header class="hero">
    <h1>Calcolatore Percentuale</h1>
    <p>Calcola percentuali in modo semplice e veloce.</p>
</header>

<section class="tool-container">
    <div class="tool-box">

        <label>Valore totale:</label>
        <input type="number" id="totale" placeholder="Inserisci totale">

        <label>Percentuale (%):</label>
        <input type="number" id="percentuale" placeholder="Inserisci percentuale">

        <button onclick="calcolaPercentuale()">Calcola</button>

        <div id="risultato" class="result-box"></div>
    </div>
</section>

<footer>
    <p>© 2025 ED Tools — Creato da Emanuele</p>
</footer>

<script>
function calcolaPercentuale() {
    const totale = parseFloat(document.getElementById("totale").value);
    const percentuale = parseFloat(document.getElementById("percentuale").value);

    if (isNaN(totale) || isNaN(percentuale)) {
        document.getElementById("risultato").innerHTML = "<p>Inserisci valori validi.</p>";
        return;
    }

    const risultato = totale * (percentuale / 100);

    document.getElementById("risultato").innerHTML = `
        <p><strong>Risultato:</strong> ${percentuale}% di ${totale} è <strong>${risultato.toFixed(2)}</strong></p>
    `;
}

document.getElementById("darkToggle").onclick = function() {
    document.body.classList.toggle("dark-mode");
    this.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
};
</script>

</body>
</html>
