<header>
    <h1>Calcolatore Sconto</h1>
    <p>Calcola rapidamente sconti e prezzo finale.</p>
</header>

<main class="tool-container">

    <div class="input-group">
        <label for="prezzo">Prezzo originale (€)</label>
        <input type="number" id="prezzo" placeholder="Inserisci il prezzo">
    </div>

    <div class="input-group">
        <label for="sconto">Sconto (%)</label>
        <input type="number" id="sconto" placeholder="Inserisci la percentuale di sconto">
    </div>

    <button onclick="calcolaSconto()" class="btn">Calcola</button>

    <div id="risultato" class="result-box" style="display:none;">
        <h2>Risultato</h2>
        <p><strong>Importo scontato:</strong> <span id="importoSconto"></span> €</p>
        <p><strong>Prezzo finale:</strong> <span id="prezzoFinale"></span> €</p>
    </div>

</main>

<footer>
    <a href="index.html">← Torna alla Home</a>
</footer>

<script>
function calcolaSconto() {
    const prezzo = parseFloat(document.getElementById("prezzo").value);
    const sconto = parseFloat(document.getElementById("sconto").value);

    if (isNaN(prezzo) || isNaN(sconto)) {
        alert("Inserisci valori validi.");
        return;
    }

    const importoSconto = (prezzo * sconto) / 100;
    const prezzoFinale = prezzo - importoSconto;

    document.getElementById("importoSconto").textContent = importoSconto.toFixed(2);
    document.getElementById("prezzoFinale").textContent = prezzoFinale.toFixed(2);

    document.getElementById("risultato").style.display = "block";
}
</script>
