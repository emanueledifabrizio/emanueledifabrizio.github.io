<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore Sconto - ED Tools</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Stile globale -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="logo">E</span>
        <span class="brand">ED Tools</span>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="tools.html">Tool</a>
        <a href="chi-sono.html">Chi sono</a>
        <a href="contatti.html">Contatti</a>
    </div>

    <button id="darkToggle" class="dark-btn">🌙</button>
</nav>

<header class="hero">
    <h1>Calcolatore Sconto</h1>
    <p>Calcola rapidamente il prezzo scontato e il risparmio.</p>
</header>

<section class="tool-container">

    <div class="tool-box">
        <label>Prezzo originale (€):</label>
        <input type="number" id="prezzo" placeholder="Inserisci prezzo">

        <label>Sconto (%):</label>
        <input type="number" id="sconto" placeholder="Inserisci percentuale">

        <button onclick="calcolaSconto()">Calcola</button>

        <div id="risultato" class="result-box"></div>
    </div>

</section>

<footer>
    <p>© 2025 ED Tools — Creato da Emanuele</p>
</footer>

<script>
function calcolaSconto() {
    const prezzo = parseFloat(document.getElementById("prezzo").value);
    const sconto = parseFloat(document.getElementById("sconto").value);

    if (isNaN(prezzo) || isNaN(sconto)) {
        document.getElementById("risultato").innerHTML = "<p>Inserisci valori validi.</p>";
        return;
    }

    const risparmio = prezzo * (sconto / 100);
    const finale = prezzo - risparmio;

    document.getElementById("risultato").innerHTML = `
        <p><strong>Risparmio:</strong> € ${risparmio.toFixed(2)}</p>
        <p><strong>Prezzo finale:</strong> € ${finale.toFixed(2)}</p>
    `;
}

document.getElementById("darkToggle").onclick = function() {
    document.body.classList.toggle("dark-mode");
    this.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
};
</script>

</body>
</html>
