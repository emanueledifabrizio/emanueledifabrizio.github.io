<header>
    <h1>Convertitore di Temperatura</h1>
    <p>Converti rapidamente tra Celsius, Fahrenheit e Kelvin.</p>
</header>

<main class="tool-container">

    <div class="input-group">
        <label for="valore">Valore</label>
        <input type="number" id="valore" placeholder="Inserisci un valore">
    </div>

    <div class="input-group">
        <label for="da">Da</label>
        <select id="da">
            <option value="c">Celsius (°C)</option>
            <option value="f">Fahrenheit (°F)</option>
            <option value="k">Kelvin (K)</option>
        </select>
    </div>

    <div class="input-group">
        <label for="a">A</label>
        <select id="a">
            <option value="c">Celsius (°C)</option>
            <option value="f">Fahrenheit (°F)</option>
            <option value="k">Kelvin (K)</option>
        </select>
    </div>

    <button onclick="convertiTemperatura()" class="btn">Converti</button>

    <div id="risultato" class="result-box" style="display:none;">
        <h2>Risultato</h2>
        <p><strong>Valore convertito:</strong> <span id="valoreConvertito"></span></p>
    </div>

</main>

<footer>
    <a href="index.html">← Torna alla Home</a>

<script>
function convertiTemperatura() {
    const valore = parseFloat(document.getElementById("valore").value);
    const da = document.getElementById("da").value;
    const a = document.getElementById("a").value;

    if (isNaN(valore)) {
        alert("Inserisci un valore valido.");
        return;
    }

    let celsius;

    // Conversione in Celsius
    if (da === "c") celsius = valore;
    if (da === "f") celsius = (valore - 32) * 5/9;
    if (da === "k") celsius = valore - 273.15;

    let risultato;

    // Conversione dal Celsius all'unità scelta
    if (a === "c") risultato = celsius;
    if (a === "f") risultato = (celsius * 9/5) + 32;
    if (a === "k") risultato = celsius + 273.15;

    document.getElementById("valoreConvertito").textContent = risultato.toFixed(2);
    document.getElementById("risultato").style.display = "block";
}
</script>
