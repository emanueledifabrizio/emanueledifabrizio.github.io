<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertitore Temperatura - ED Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
</head>

<body>

    <nav class="navbar">
        <div class="nav-left">
            <span class="logo">E</span>
            <span class="brand">ED Tools</span>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="tools.html">Tool</a>
            <a href="novita.html">Novità</a>
            <a href="faq.html">FAQ</a>
            <a href="chi-sono.html">Chi sono</a>
            <a href="contatti.html">Contatti</a>
        </div>

        <button id="darkToggle" class="dark-btn">🌙</button>
    </nav>

    <header class="hero">
        <h1>Convertitore di temperatura</h1>
        <p>Converti facilmente tra Celsius, Fahrenheit e Kelvin.</p>
    </header>

    <section class="tool-container">
        <div class="tool-card">

            <label for="tempInput">Inserisci valore</label>
            <input type="number" id="tempInput" placeholder="Es. 25">

            <label for="fromUnit">Da</label>
            <select id="fromUnit">
                <option value="c">Celsius (°C)</option>
                <option value="f">Fahrenheit (°F)</option>
                <option value="k">Kelvin (K)</option>
            </select>

            <label for="toUnit">A</label>
            <select id="toUnit">
                <option value="c">Celsius (°C)</option>
                <option value="f">Fahrenheit (°F)</option>
                <option value="k">Kelvin (K)</option>
            </select>

            <button id="convertTemp" class="btn">Converti</button>

            <div class="result-box">
                <label>Risultato</label>
                <input type="text" id="tempResult" readonly>
            </div>

        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
