<body>

<header>
    <h1>Calcolatore IVA</h1>
    <p>Calcola rapidamente IVA, imponibile e totale.</p>
</header>

<main class="tool-container">

    <div class="input-group">
        <label for="importo">Importo (€)</label>
        <input type="number" id="importo" placeholder="Inserisci importo">
    </div>

    <div class="input-group">
        <label for="aliquota">Aliquota IVA (%)</label>
        <select id="aliquota">
            <option value="22">22%</option>
            <option value="10">10%</option>
            <option value="5">5%</option>
            <option value="4">4%</option>
        </select>
    </div>

    <button onclick="calcolaIVA()" class="btn">Calcola</button>

    <div id="risultato" class="result-box" style="display:none;">
        <h2>Risultato</h2>
        <p><strong>Imponibile:</strong> <span id="imponibile"></span> €</p>
        <p><strong>IVA:</strong> <span id="iva"></span> €</p>
        <p><strong>Totale:</strong> <span id="totale"></span> €</p>
    </div>

</main>

<footer>
    <a href="index.html">← Torna alla Home</a>
</footer>

<script>
function calcolaIVA() {
    const importo = parseFloat(document.getElementById("importo").value);
    const aliquota = parseFloat(document.getElementById("aliquota").value);

    if (isNaN(importo)) {
        alert("Inserisci un importo valido.");
        return;
    }

    const imponibile = importo / (1 + aliquota / 100);
    const iva = importo - imponibile;
    const totale = importo;

    document.getElementById("imponibile").textContent = imponibile.toFixed(2);
    document.getElementById("iva").textContent = iva.toFixed(2);
    document.getElementById("totale").textContent = totale.toFixed(2);

    document.getElementById("risultato").style.display = "block";
}
</script>

</body>
