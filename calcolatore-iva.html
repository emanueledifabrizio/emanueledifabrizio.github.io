<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore IVA - ED Tools</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="logo">E</span>
        <span class="brand">ED Tools</span>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="tools.html">Tool</a>
        <a href="novita.html">Novità</a>
        <a href="faq.html">FAQ</a>
        <a href="chi-sono.html">Chi sono</a>
        <a href="contatti.html">Contatti</a>
    </div>

    <button id="darkToggle" class="dark-btn">🌙</button>
</nav>

<header class="hero">
    <h1>Calcolatore IVA</h1>
    <p>Calcola rapidamente IVA e prezzo finale.</p>
</header>

<section class="tool-container">
    <div class="tool-box">

        <label>Prezzo senza IVA (€):</label>
        <input type="number" id="prezzo" placeholder="Inserisci prezzo">

        <label>Aliquota IVA (%):</label>
        <input type="number" id="aliquota" value="22">

        <button onclick="calcolaIVA()">Calcola</button>

        <div id="risultato" class="result-box"></div>
    </div>
</section>

<footer>
    <p>© 2025 ED Tools — Creato da Emanuele</p>
</footer>

<script>
function calcolaIVA() {
    const prezzo = parseFloat(document.getElementById("prezzo").value);
    const aliquota = parseFloat(document.getElementById("aliquota").value);

    if (isNaN(prezzo) || isNaN(aliquota)) {
        document.getElementById("risultato").innerHTML = "<p>Inserisci valori validi.</p>";
        return;
    }

    const iva = prezzo * (aliquota / 100);
    const totale = prezzo + iva;

    document.getElementById("risultato").innerHTML = `
        <p><strong>IVA:</strong> € ${iva.toFixed(2)}</p>
        <p><strong>Totale:</strong> € ${totale.toFixed(2)}</p>
    `;
}

document.getElementById("darkToggle").onclick = function() {
    document.body.classList.toggle("dark-mode");
    this.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
};
</script>

</body>
</html>
