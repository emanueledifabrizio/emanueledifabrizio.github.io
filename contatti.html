<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti - ED Tools</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="logo">E</span>
        <span class="brand">ED Tools</span>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="tools.html">Tool</a>
        <a href="novita.html">Novità</a>
        <a href="faq.html">FAQ</a>
        <a href="chi-sono.html">Chi sono</a>
        <a href="contatti.html" class="active">Contatti</a>
    </div>

    <button id="darkToggle" class="dark-btn">🌙</button>
</nav>

<header class="hero">
    <h1>Contatti</h1>
    <p>Hai domande, suggerimenti o vuoi segnalare un problema? Scrivimi qui.</p>
</header>

<section class="tool-container">
    <div class="tool-box" style="text-align:left;">

        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

            <label>Nome:</label>
            <input type="text" name="nome" required>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Messaggio:</label>
            <textarea name="messaggio" rows="5" required></textarea>

            <button type="submit">Invia</button>
        </form>

        <p style="margin-top:20px; font-size:14px; opacity:0.8;">
            Risponderò il prima possibile.
        </p>

    </div>
</section>

<footer>
    <p>© 2025 ED Tools — Creato da Emanuele</p>
</footer>

<script>
document.getElementById("darkToggle").onclick = function() {
    document.body.classList.toggle("dark-mode");
    this.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
};
</script>

</body>
</html>
