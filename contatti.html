<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti - ED Tools</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Stile globale -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="logo">E</span>
        <span class="brand">ED Tools</span>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="tools.html">Tool</a>
        <a href="chi-sono.html">Chi sono</a>
        <a href="contatti.html" class="active">Contatti</a>
    </div>

    <button id="darkToggle" class="dark-btn">🌙</button>
</nav>

<header class="hero">
    <h1>Contattami</h1>
    <p>Hai domande, suggerimenti o richieste? Scrivimi qui sotto.</p>
</header>

<section class="tool-container">

    <div class="tool-box">
        <form action="https://formspree.io/f/tuo-endpoint" method="POST">

            <label>Nome:</label>
            <input type="text" name="nome" required placeholder="Il tuo nome">

            <label>Email:</label>
            <input type="email" name="email" required placeholder="La tua email">

            <label>Messaggio:</label>
            <textarea name="messaggio" rows="5" required placeholder="Scrivi il tuo messaggio"></textarea>

            <button type="submit">Invia</button>
        </form>
    </div>

</section>

<footer>
    <p>© 2025 ED Tools — Creato da Emanuele</p>
</footer>

<script>
document.getElementById("darkToggle").onclick = function() {
    document.body.classList.toggle("dark-mode");
    this.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
};
</script>

</body>
</html>
